<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header> <h1>Formulario de contacto</h1></header>

    <form action="#" method="post">

        <label for="nombre">Nombre y apellido</label>
        <input type="text" id="nombre" name="nombre"
            placeholder="Ej: Garcia" required>
        <br><br>    

        <label for="email">Correo electronico</label>
        <input type="email" id="email" name="email"
        placeholder="tu@mail.com" required>
        <br><br>

        <label for="telefono">Telefono</label>
        <input type="tel" id="telefono" name="telefono"
        placeholder="+5411 0000-000">
        <br><br>

        <label for="programa">Porgrama de interés</label>
        <select id="programa" name="programa" required>
            <option value="">Elegir programa</option>
            <option value="pll">Primeras lineas de codigo</option>
            <option value="mt">Mujeres en tecnologia</option>
            <option value="ec">Escuelas conectadas</option>
        </select>
        <br><br>

        <label for="disponibilidad">Disponibilidad</label>
        <select id="disponibilidad" name="disponibilidad">
            <option value="mañana">Mañana</option>
            <option value="tarde">Tarde</option>
            <option value="noche">Noche</option>
        </select>
        <br><br>

        <label for="mensaje">
            ¿por qué querés sumarte?
        </label>
        <br><br>
        <textarea id="mensaje" name="mensaje"
            rows="4"
            placeholder="Contanos un poco">
        </textarea>
        <br><br>

        <button type="submit">Enviar inscripción</button>

  </form>
</body>
</html>
